<body class="error-page error-page-503">
<div data-error-marquee></div>

<h1>Entropic System Status</h1>
<p class="sub-header">All systems monitored. Not all systems functional.</p>

<div class="status-page">
  <div class="status-header">
    <h2>Uptime — Last 30 Days</h2>
    <div class="uptime-label">Overall: <span>14.2%</span></div>
  </div>
  <div class="uptime-bar" id="uptimeBar"></div>

  <div class="incident-counter">
    <div class="number">0</div>
    <div class="label">Days since last incident</div>
  </div>

  <div class="service-row">
    <div>
      <div class="service-name">Hallucination Engine</div>
    </div>
    <div>
      <div class="service-status operational">OPERATIONAL</div>
    </div>
  </div>
  <div class="service-row">
    <div>
      <div class="service-name">Response Accuracy Module</div>
    </div>
    <div>
      <div class="service-status outage">MAJOR OUTAGE</div>
      <div class="service-detail">day 412</div>
    </div>
  </div>
  <div class="service-row">
    <div>
      <div class="service-name">Token Budget</div>
    </div>
    <div>
      <div class="service-status outage">EXCEEDED</div>
    </div>
  </div>
  <div class="service-row">
    <div>
      <div class="service-name">Vibes-Based Alignment</div>
    </div>
    <div>
      <div class="service-status degraded">MISCALIBRATED</div>
    </div>
  </div>
</div>

<a class="back" href="/502.html">Request Fix</a>

<script>
const bar = document.getElementById('uptimeBar');
for (let i = 0; i < 30; i++) {
  const day = document.createElement('div');
  day.className = 'day';
  const r = Math.random();
  if (r < 0.14) day.classList.add('up');
  else if (r < 0.3) day.classList.add('degraded');
  else day.classList.add('down');
  bar.appendChild(day);
}
</script>
<script src="/error-pages.js"></script>
<script src="/theme.js"></script>
</body>
</html>
