[build]
  publish = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from = "/api/conv/*"
  to = "/.netlify/functions/conv"
  status = 200

[[redirects]]
  from = "/c/*"
  to = "/index.html"
  status = 200

# Block the spy source from being served as a static asset.
# Spy mode runs locally only — see LOGGING.md.
[[redirects]]
  from = "/local/*"
  to = "/404.html"
  status = 404
