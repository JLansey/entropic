[build]
  publish = "."
  functions = "netlify/functions"
  # Minify JS/CSS in-place on Netlify's build server (local files untouched).
  command = "npx -y esbuild@0.24.2 app.js theme.js theme-init.js reviews.js styles.css dark-mode.css --minify --allow-overwrite --outdir=."

[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200

[[redirects]]
  from = "/api/config"
  to = "/.netlify/functions/config"
  status = 200

[[redirects]]
  from = "/api/conv/*"
  to = "/.netlify/functions/conv"
  status = 200

[[redirects]]
  from = "/c/*"
  to = "/index.html"
  status = 200

# Block the spy source from being served as a static asset.
# Spy mode runs locally only — see LOGGING.md.
[[redirects]]
  from = "/local/*"
  to = "/404.html"
  status = 404
