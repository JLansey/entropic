<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#faf9f7"/>
      <stop offset="100%" style="stop-color:#f0ebe4"/>
    </linearGradient>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Chat box shadow -->
  <rect x="298" y="82" width="604" height="466" rx="16" fill="#00000008"/>
  
  <!-- Chat box -->
  <rect x="300" y="80" width="600" height="460" rx="16" fill="white" stroke="#ddd" stroke-width="1"/>
  
  <!-- Chat header -->
  <rect x="300" y="80" width="600" height="48" rx="16" fill="#b85c38"/>
  <rect x="300" y="104" width="600" height="24" fill="#b85c38"/>
  <text x="330" y="110" font-family="Inter, sans-serif" font-size="14" font-weight="600" fill="white">💬 Clod 4 Oopus</text>
  <text x="830" y="110" font-family="Inter, sans-serif" font-size="11" fill="white" opacity="0.7">● Probably Online</text>
  
  <!-- Chat background -->
  <rect x="300" y="128" width="600" height="412" fill="#fdfcfa"/>
  <rect x="300" y="500" width="600" height="40" rx="0" fill="#fdfcfa"/>
  <rect x="300" y="524" width="600" height="16" rx="16" fill="white"/>
  
  <!-- Bot message 1 -->
  <rect x="320" y="148" width="420" height="52" rx="14" fill="#f0ebe4"/>
  <text x="336" y="170" font-family="Inter, sans-serif" font-size="13" fill="#333">Hi! I'm Clod. I'll do my best, but I make</text>
  <text x="336" y="188" font-family="Inter, sans-serif" font-size="13" fill="#333">no promises. What can I sort of help you with?</text>
  
  <!-- User message -->
  <rect x="560" y="216" width="320" height="36" rx="14" fill="#b85c38"/>
  <text x="580" y="240" font-family="Inter, sans-serif" font-size="13" fill="white">Explain quantum physics</text>
  
  <!-- Bot message 2 -->
  <rect x="320" y="268" width="440" height="72" rx="14" fill="#f0ebe4"/>
  <text x="336" y="290" font-family="Inter, sans-serif" font-size="13" fill="#333">Quantum physics is when very small things</text>
  <text x="336" y="308" font-family="Inter, sans-serif" font-size="13" fill="#333">have very big feelings. The electron doesn't</text>
  <text x="336" y="326" font-family="Inter, sans-serif" font-size="13" fill="#333">know where it is, and honestly, same.</text>
  
  <!-- User message 2 -->
  <rect x="640" y="356" width="240" height="36" rx="14" fill="#b85c38"/>
  <text x="660" y="380" font-family="Inter, sans-serif" font-size="13" fill="white">Are you safe?</text>
  
  <!-- Bot message 3 -->
  <rect x="320" y="408" width="380" height="52" rx="14" fill="#f0ebe4"/>
  <text x="336" y="430" font-family="Inter, sans-serif" font-size="13" fill="#333">Per our Responsible Irresponsibility guidelines,</text>
  <text x="336" y="448" font-family="Inter, sans-serif" font-size="13" fill="#333">I'm required to say: absolutely not. 😊</text>
  
  <!-- Bottom bar -->
  <rect x="300" y="524" width="600" height="16" rx="0" fill="white" stroke="#eee" stroke-width="1"/>
  
  <!-- Branding top left -->
  <text x="48" y="52" font-family="Inter, sans-serif" font-size="22" font-weight="700" fill="#b85c38">entropic</text>
  <text x="168" y="52" font-family="Inter, sans-serif" font-size="22" font-weight="300" fill="#cc9966">.ai</text>
  
  <!-- Tagline bottom -->
  <text x="600" y="600" font-family="Inter, sans-serif" font-size="15" fill="#999" text-anchor="middle" font-weight="300">Safety-Last AI · Now with 47% more hallucinations</text>
</svg>
