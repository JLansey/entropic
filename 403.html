<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>403 – Verify You Are Human</title>
<meta property="og:title" content="403 — Verify You Are Human">
<meta property="og:description" content="Complete this quick security check. Select all images containing a sense of purpose.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://clodoop.us/403.html">
<meta property="og:image" content="https://clodoop.us/images/og/403.jpg">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="403 — Verify You Are Human">
<meta name="twitter:description" content="Complete this quick security check. Select all images containing a sense of purpose.">
<meta name="twitter:image" content="https://clodoop.us/images/og/403.jpg">
<link rel="stylesheet" href="/error-pages.css">
<link rel="stylesheet" href="/dark-mode.css">
<script src="/theme-init.js"></script>
</head>
<body class="error-page error-page-403">
<div data-error-marquee></div>

<h1>Verify You Are Human</h1>
<p class="sub">To continue, please complete this quick security check.</p>

<div class="result-text" id="resultText"></div>

<div class="captcha-box" id="captchaBox">
  <!-- <div class="captcha-header">Entropic Security Theater&trade;</div> -->
  <div class="captcha-prompt">Select all images containing <em>a sense of purpose</em>.</div>
  <div class="image-grid" id="imageGrid"></div>
  <div class="captcha-verify">
    <button onclick="verifyCaptcha()">Verify</button>
  </div>
</div>

<div class="round2" id="round2">
  <div class="question-text">What does water taste like?</div>
  <button class="choice" onclick="pickWater(this, 0)">A) Wet</button>
  <button class="choice" onclick="pickWater(this, 1)">B) Clear</button>
  <button class="choice" onclick="pickWater(this, 2)">C) Water-flavored</button>
  <button class="choice" onclick="pickWater(this, 3)">D) I don't remember</button>
</div>

<div class="result-text" id="waterResultText"></div>

<div class="verified-badge" id="verifiedBadge">Verified by Entropic Security Theater&trade;</div>

<a class="back" href="/#chat" id="nextBtn">Back to Clod</a>

<script>
var stockImages = [
  { label: 'office plant', src: '/images/403-captcha/office-plant-thumb.webp' },
  { label: 'empty mug', src: '/images/403-captcha/empty-mug-thumb.webp' },
  { label: 'parking lot', src: '/images/403-captcha/parking-lot-thumb.webp' },
  { label: 'ceiling tile', src: '/images/403-captcha/ceiling-tile-thumb.webp' },
  { label: 'beige wall', src: '/images/403-captcha/beige-wall-thumb.webp' },
  { label: 'laptop (closed)', src: '/images/403-captcha/closed-laptop-thumb.webp' },
  { label: 'fire extinguisher', src: '/images/403-captcha/fire-extinguisher-thumb.webp' },
  { label: 'hallway', src: '/images/403-captcha/hallway-thumb.webp' },
  { label: 'clock', src: '/images/403-captcha/clock-thumb.webp' },
  { label: 'stapler', src: '/images/403-captcha/stapler-thumb.webp' },
  { label: 'rolling office chair', src: '/images/403-captcha/swivel-chair-thumb.webp' },
  { label: 'empty cubicle', src: '/images/403-captcha/empty-cubicle-thumb.webp' },
  { label: 'blank whiteboard', src: '/images/403-captcha/whiteboard-thumb.webp' },
  { label: 'filing cabinet', src: '/images/403-captcha/filing-cabinet-thumb.webp' },
  { label: 'paper shredder', src: '/images/403-captcha/paper-shredder-thumb.webp' },
  { label: 'fluorescent light', src: '/images/403-captcha/fluorescent-light-thumb.webp' },
  { label: 'ethernet cable', src: '/images/403-captcha/ethernet-cable-thumb.webp' },
  { label: 'archive boxes', src: '/images/403-captcha/archive-boxes-thumb.webp' },
  { label: 'conference chairs', src: '/images/403-captcha/conference-chairs-thumb.webp' }
];

function shuffleImages(items) {
  var shuffled = items.slice();

  for (var i = shuffled.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var temp = shuffled[i];
    shuffled[i] = shuffled[j];
    shuffled[j] = temp;
  }

  return shuffled;
}

function chooseCaptchaImages(items, count) {
  var previousSelection = [];
  var previousBySrc = {};
  var unseen = [];
  var seen = [];
  var chosen = [];
  var remaining = [];
  var minFresh = 0;
  var shuffled = shuffleImages(items);

  try {
    previousSelection = JSON.parse(localStorage.getItem('captcha403LastSelection') || '[]');
  } catch (error) {
    previousSelection = [];
  }

  if (!previousSelection.length || items.length <= count) {
    return shuffled.slice(0, count);
  }

  for (var i = 0; i < previousSelection.length; i++) {
    previousBySrc[previousSelection[i]] = true;
  }

  for (var j = 0; j < shuffled.length; j++) {
    if (previousBySrc[shuffled[j].src]) {
      seen.push(shuffled[j]);
    } else {
      unseen.push(shuffled[j]);
    }
  }

  minFresh = Math.min(4, unseen.length);
  chosen = unseen.slice(0, minFresh);
  remaining = shuffleImages(items.filter(function(item) {
    return chosen.indexOf(item) === -1;
  }));

  while (chosen.length < count && remaining.length) {
    chosen.push(remaining.shift());
  }

  return chosen.slice(0, count);
}

var grid = document.getElementById('imageGrid');
var visibleImages = chooseCaptchaImages(stockImages, 9);

try {
  localStorage.setItem('captcha403LastSelection', JSON.stringify(visibleImages.map(function(image) {
    return image.src;
  })));
} catch (error) {
  // Ignore localStorage failures and fall back to per-load randomness.
}

for (var i = 0; i < visibleImages.length; i++) {
  var cell = document.createElement('div');
  var thumb = document.createElement('img');

  cell.className = 'cell';
  cell.title = visibleImages[i].label;
  thumb.src = visibleImages[i].src;
  thumb.alt = '';
  thumb.width = 256;
  thumb.height = 256;
  thumb.decoding = 'async';
  thumb.loading = 'lazy';
  cell.appendChild(thumb);
  cell.addEventListener('click', function() { this.classList.toggle('selected'); });
  grid.appendChild(cell);
}

function verifyCaptcha() {
  document.getElementById('captchaBox').style.display = 'none';
  document.getElementById('resultText').textContent = 'Hmm. Inconclusive. One more step.';
  document.getElementById('resultText').style.display = 'block';
  document.getElementById('round2').style.display = 'block';
}

var waterPicked = false;
var waterResponses = [
  "That's exactly what an AI would say.",
  "That's a shape, not a taste. Suspicious.",
  "Circular reasoning detected. Very human, actually.",
  "Concerning, but we'll allow it."
];
function pickWater(el, idx) {
  if (waterPicked) return;
  waterPicked = true;
  el.classList.add('selected');
  document.querySelectorAll('.choice').forEach(function(c) { c.style.cursor = 'default'; });
  document.getElementById('waterResultText').textContent = waterResponses[idx];
  document.getElementById('waterResultText').style.display = 'block';
  document.getElementById('verifiedBadge').style.display = 'block';
  document.getElementById('nextBtn').style.display = 'inline-block';
}
</script>
<script src="/error-pages.js"></script>
<script src="/theme.js"></script>
</body>
</html>
