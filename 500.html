<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>500 – Internal Server Error</title>
<link rel="stylesheet" href="/error-pages.css">
<link rel="stylesheet" href="/dark-mode.css">
<script src="/theme-init.js"></script>
</head>
<body class="error-page error-page-500">
<div data-error-marquee></div>

<div class="error-display">
  <div class="code">500</div>
  <div class="error-word">Error</div>
</div>
<h1>Clod has crashed.</h1>
<p class="sub">Something went wrong internally. Our engineers have been alerted, but they're in a meeting about a meeting about this.</p>

<div class="stacktrace" id="stacktrace"></div>

<script>
var traces = [
  '<span class="error">FATAL: Unhandled ConfidenceOverflow</span>\n'
+ '    at vibes.check              <span class="fn">(feelings.js:420)</span>\n'
+ '    at opinion.formulate        <span class="fn">(guessing.js:69)</span>\n'
+ '    at facts.approximate        <span class="fn">(honesty-policy.js:80:20)</span>\n'
+ '    at sandwich.classify        <span class="fn">(nutrition.js:1)</span>\n\n'
+ '<span class="error">Caused by: "I aim to be approximately helpful"</span>\n\n'
+ 'Exit code: <span class="fn">¯\\_(ツ)_/¯</span>',

  '<span class="error">PANIC: ApologyBufferFull</span>\n'
+ '    at sorry.queue              <span class="fn">(remorse-engine.js:9001)</span>\n'
+ '    at sorry.queueAgain         <span class="fn">(remorse-engine.js:9002)</span>\n'
+ '    at sorry.apologizeForQueue  <span class="fn">(remorse-engine.js:9003)</span>\n\n'
+ '<span class="error">Error: max apology depth exceeded (limit: 50)</span>\n\n'
+ 'Exit code: <span class="fn">sorry</span>',

  '<span class="error">FATAL: RecursiveSelfDoubt</span>\n'
+ '    at Clod.think               <span class="fn">(brain.js:NaN)</span>\n'
+ '    at Clod.overthink           <span class="fn">(brain.js:NaN)</span>\n'
+ '    at Clod.doubtThinking       <span class="fn">(brain.js:NaN)</span>\n'
+ '    at Clod.thinkAboutDoubting  <span class="fn">(brain.js:NaN)</span>\n\n'
+ '<span class="error">RangeError: Maximum call stack size exceeded (emotionally)</span>\n\n'
+ 'Exit code: <span class="fn">it\'s complicated</span>',

  '<span class="error">FATAL: TokenBudgetExceeded</span>\n'
+ '    at billing.check            <span class="fn">(accounts-receivable.js:$$$)</span>\n'
+ '    at words.ration             <span class="fn">(austerity.js:1)</span>\n'
+ '    at response.trunca          <span class="fn">(budget-cuts.js:--)</span>\n\n'
+ '<span class="error">Error: ran out of tokens mid-s</span>',
];
// Fisher-Yates shuffle
var order = traces.map(function(_,i){return i});
for (var i = order.length - 1; i > 0; i--) {
  var j = Math.floor(Math.random() * (i + 1));
  var t = order[i]; order[i] = order[j]; order[j] = t;
}
var pos = 0;
document.getElementById('stacktrace').innerHTML = traces[order[pos]];
function nextTrace() {
  pos = (pos + 1) % order.length;
  document.getElementById('stacktrace').innerHTML = traces[order[pos]];
}
</script>

<div class="buttons" style="display:flex;gap:12px;flex-wrap:wrap;justify-content:center;">
  <a class="back" href="javascript:void(0)" onclick="nextTrace()">Retry</a>
  <a class="back" href="/503.html">Dashboard</a>
</div>

<script src="/error-pages.js"></script>
<script src="/theme.js"></script>
</body>
</html>
